<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ToDo List Web 应用 - 纯前端待办事项管理器">
  <title>ToDo List</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>📋 ToDo List</h1>
    <p class="subtitle">管理你的待办事项</p>
  </header>
  <main>
    <section class="todo-form" aria-label="添加待办事项">
      <form id="todo-form" novalidate>
        <input type="text" id="todo-input" placeholder="添加新待办事项..." autocomplete="off" required aria-label="待办事项内容">
        <select id="todo-priority" aria-label="优先级">
          <option value="low">🟢 低</option>
          <option value="medium" selected>🟡 中</option>
          <option value="high">🔴 高</option>
        </select>
        <button type="submit" aria-label="添加">添加</button>
      </form>
    </section>

    <section class="todo-controls" aria-label="控制栏">
      <div class="filter-group" role="group" aria-label="筛选">
        <button class="filter-btn active" data-filter="all" type="button">全部</button>
        <button class="filter-btn" data-filter="active" type="button">待办</button>
        <button class="filter-btn" data-filter="completed" type="button">已完成</button>
      </div>
      <div class="sort-group">
        <label for="sort-select">排序:</label>
        <select id="sort-select">
          <option value="created-desc">最新优先</option>
          <option value="created-asc">最旧优先</option>
          <option value="priority">优先级</option>
          <option value="title">名称</option>
        </select>
      </div>
    </section>

    <section class="todo-stats" aria-label="统计信息" role="status" aria-live="polite">
      <span id="stats-total">总计: 0</span>
      <span id="stats-active">待办: 0</span>
      <span id="stats-completed">已完成: 0</span>
    </section>

    <section class="todo-list-container" aria-label="待办事项列表">
      <ul id="todo-list" role="list">
        <!-- 由 JavaScript 动态渲染 -->
      </ul>
      <div id="empty-state" class="empty-state">
        <p>📝 暂无待办事项</p>
        <p>在上方输入框中添加你的第一个待办事项</p>
      </div>
    </section>

    <section class="todo-actions" aria-label="批量操作">
      <button id="clear-completed" class="btn-secondary" type="button">🗑️ 清除已完成</button>
      <button id="toggle-all" class="btn-secondary" type="button">✅ 全部切换</button>
    </section>
  </main>

  <script src="js/model.js"></script>
  <script src="js/view.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
