<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项 · Todo List</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>📋 待办事项</h1>
      <p class="app-subtitle">Todo List</p>
    </header>

    <main>
      <section class="todo-input-section">
        <form id="todo-form" class="todo-form">
          <div class="input-row">
            <input
              type="text"
              id="todo-input"
              class="todo-input"
              placeholder="输入新的待办事项…"
              autocomplete="off"
              required
            >
            <button type="submit" class="btn btn-primary" id="add-btn">添加</button>
          </div>
        </form>
      </section>

      <section class="todo-controls">
        <div class="filter-group">
          <button type="button" class="filter-btn active" data-filter="all">全部</button>
          <button type="button" class="filter-btn" data-filter="active">未完成</button>
          <button type="button" class="filter-btn" data-filter="completed">已完成</button>
        </div>
        <div class="stats-group">
          <span class="stats-text" id="stats-text">0 / 0 已完成</span>
          <button type="button" class="btn btn-clear" id="clear-btn">清除已完成</button>
        </div>
      </section>

      <section class="todo-list-section">
        <ul id="todo-list" class="todo-list">
          <!-- Todos rendered by JS -->
        </ul>
        <p class="empty-state" id="empty-state">暂无待办事项</p>
      </section>
    </main>

    <footer class="app-footer">
      <p>数据保存在浏览器本地 · localStorage</p>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
