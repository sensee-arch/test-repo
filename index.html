<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="todo-container" id="todo-app">
    <header class="todo-header">
      <h1 class="todo-header__title">📋 Todo List</h1>
      <form class="todo-form" id="todo-form" autocomplete="off">
        <input
          class="todo-form__input"
          id="todo-input"
          type="text"
          placeholder="What needs to be done?"
          maxlength="200"
          required
          aria-label="New task title"
        />
        <button class="todo-form__submit" type="submit" aria-label="Add task">Add</button>
      </form>
    </header>

    <div class="todo-list-wrap">
      <ul class="todo-list" id="todo-list" aria-label="Task list">
        <!-- Tasks rendered by JavaScript -->
      </ul>
    </div>

    <footer class="todo-footer">
      <span class="todo-footer__count" id="todo-count">0 items left</span>
      <nav class="todo-footer__filters" aria-label="Filter tasks">
        <button class="todo-footer__filter-btn todo-footer__filter-btn--selected" data-filter="all" type="button">All</button>
        <button class="todo-footer__filter-btn" data-filter="active" type="button">Active</button>
        <button class="todo-footer__filter-btn" data-filter="completed" type="button">Completed</button>
      </nav>
      <button class="todo-footer__clear" id="clear-completed" type="button" style="display:none">Clear completed</button>
    </footer>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
