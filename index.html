<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A simple TodoList web application built with vanilla JavaScript">
  <title>TodoList</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>📋 TodoList</h1>
    </header>

    <main class="app-main">
      <!-- Add Todo Form -->
      <form class="todo-form" id="todo-form" autocomplete="off">
        <input
          type="text"
          id="todo-input"
          class="todo-input"
          placeholder="What needs to be done?"
          required
          maxlength="200"
          aria-label="New todo item"
        >
        <button type="submit" class="btn btn-add" aria-label="Add todo">Add</button>
      </form>

      <!-- Filters -->
      <div class="filter-bar" role="tablist" aria-label="Filter todos">
        <button type="button" class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>
        <button type="button" class="filter-btn" data-filter="active" role="tab" aria-selected="false">Active</button>
        <button type="button" class="filter-btn" data-filter="completed" role="tab" aria-selected="false">Completed</button>
      </div>

      <!-- Todo List -->
      <ul class="todo-list" id="todo-list" aria-label="Todo items">
        <!-- Tasks rendered by JavaScript -->
      </ul>

      <!-- Footer -->
      <footer class="todo-footer" id="todo-footer">
        <span class="todo-count" id="todo-count">0 items left</span>
        <button type="button" class="btn btn-clear" id="clear-completed" aria-label="Clear completed items">
          Clear Completed
        </button>
      </footer>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
