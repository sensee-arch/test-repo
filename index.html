<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="A simple and elegant TodoList application built with vanilla JavaScript">
  <title>TodoList</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1 class="app-title">📋 TodoList</h1>
      <p class="app-subtitle">Stay organized, get things done</p>
    </header>

    <main class="app-main">
      <!-- Task Input Form -->
      <form class="todo-form" id="todo-form" novalidate>
        <div class="input-group">
          <input
            type="text"
            id="todo-input"
            class="todo-input"
            placeholder="What needs to be done?"
            maxlength="200"
            autocomplete="off"
            aria-label="New todo item"
          >
          <button type="submit" class="btn btn-primary" id="add-btn" aria-label="Add todo">
            Add
          </button>
        </div>
      </form>

      <!-- Filter & Stats Bar -->
      <div class="toolbar" id="toolbar">
        <span class="todo-count" id="todo-count">
          <strong id="active-count">0</strong> item(s) left
        </span>
        <div class="filter-group" role="group" aria-label="Filter todos">
          <button type="button" class="filter-btn active" data-filter="all">All</button>
          <button type="button" class="filter-btn" data-filter="active">Active</button>
          <button type="button" class="filter-btn" data-filter="completed">Completed</button>
        </div>
      </div>

      <!-- Todo List -->
      <ul class="todo-list" id="todo-list" aria-label="Todo items">
        <!-- Dynamically rendered -->
      </ul>

      <!-- Clear Completed -->
      <div class="clear-bar" id="clear-bar">
        <button type="button" class="btn btn-clear" id="clear-completed">
          Clear Completed
        </button>
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="empty-state" hidden>
        <div class="empty-icon">✏️</div>
        <p class="empty-text">No tasks yet. Add one above!</p>
      </div>
    </main>

    <footer class="app-footer">
      <p>Double-click to edit a task</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
