<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TodoList Web Application — manage your tasks locally">
  <title>TodoList</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>TodoList</h1>
    <p class="subtitle">Stay organized, one task at a time</p>
  </header>

  <main>
    <section aria-label="Add a new todo">
      <form id="todo-form">
        <label for="todo-input" class="sr-only">New task</label>
        <input
          type="text"
          id="todo-input"
          placeholder="What needs to be done?"
          autocomplete="off"
        />
        <button type="submit" id="todo-add-btn">Add</button>
      </form>
      <p id="todo-error" class="error-message" role="alert" hidden></p>
    </section>

    <section aria-label="Todo list">
      <ul id="todo-list" role="list"></ul>
    </section>

    <section id="todo-stats" aria-label="Stats">
      <span id="todo-count"></span>
      <span id="todo-completed"></span>
    </section>

    <section id="todo-footer" aria-label="Data notice">
      <p class="storage-notice">
        <small>Data stored locally — clearing browser data will erase todos.</small>
      </p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 TodoList App</p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
