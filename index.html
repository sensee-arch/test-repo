<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A zero-dependency ToDo List web app built with vanilla HTML, CSS, and JavaScript." />
  <title>ToDo List</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app" role="application" aria-label="ToDo List Application">
    <header class="todo-header">
      <h1 class="app-title">ToDo List</h1>
    </header>

    <form id="todoForm" class="todo-form" aria-label="Add a new task">
      <div class="input-row">
        <label for="todoInput" class="sr-only">Task description</label>
        <input
          id="todoInput"
          type="text"
          placeholder="What needs to be done?"
          maxlength="200"
          autocomplete="off"
          aria-describedby="inputHelp"
        />
        <button id="addBtn" type="submit" disabled aria-label="Add task">+ Add</button>
      </div>
      <p id="inputHelp" class="input-hint" role="status" aria-live="polite"></p>
    </form>

    <div class="toolbar" role="toolbar" aria-label="Filter and sort controls">
      <div class="filter-group" role="group" aria-label="Filter tasks">
        <button class="filter-btn active" data-filter="all" aria-pressed="true">All</button>
        <button class="filter-btn" data-filter="active" aria-pressed="false">Active</button>
        <button class="filter-btn" data-filter="completed" aria-pressed="false">Completed</button>
      </div>
      <button id="clearCompletedBtn" class="clear-btn" type="button" title="Remove all completed tasks" aria-label="Clear completed tasks">
        Clear completed
      </button>
    </div>

    <ul id="todoList" class="todo-list" role="list" aria-label="Task list">
      <!-- Rendered by js/view.js -->
    </ul>

    <div id="emptyState" class="empty-state" role="status">
      <p class="empty-icon" aria-hidden="true">📋</p>
      <p class="empty-text">No tasks yet. Add one above!</p>
    </div>

    <footer class="todo-footer">
      <span id="itemsLeft" role="status">0 items left</span>
      <span id="storageWarn" class="storage-warn hidden" role="alert" aria-live="polite">⚠️ Storage full</span>
    </footer>

    <div id="errorToast" class="error-toast hidden" role="alert" aria-live="assertive"></div>
  </div>

  <script src="js/model.js"></script>
  <script src="js/view.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
