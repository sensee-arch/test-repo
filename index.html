<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo List</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>📋 ToDo</h1>
      <form id="todo-form" class="todo-form" autocomplete="off">
        <input
          type="text"
          id="todo-input"
          class="todo-input"
          placeholder="What needs to be done?"
          aria-label="New todo item"
          required
        >
        <button type="submit" class="btn-add" aria-label="Add todo">+</button>
      </form>
    </header>

    <main class="app-main">
      <section class="todo-list-section" aria-label="Todo list">
        <ul id="todo-list" class="todo-list" role="list">
          <!-- Dynamically rendered -->
        </ul>
        <div id="empty-state" class="empty-state hidden">
          <p>✨ No tasks yet. Add one above!</p>
        </div>
      </section>

      <footer class="app-footer">
        <span id="item-count" class="item-count">0 items left</span>
        <div class="filter-bar" role="group" aria-label="Filter todos">
          <button class="filter-btn active" data-filter="all" aria-pressed="true">All</button>
          <button class="filter-btn" data-filter="active" aria-pressed="false">Active</button>
          <button class="filter-btn" data-filter="completed" aria-pressed="false">Completed</button>
        </div>
        <button id="clear-completed" class="btn-clear" title="Remove completed items">Clear completed</button>
      </footer>
    </main>
  </div>

  <script src="js/model.js"></script>
  <script src="js/view.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
