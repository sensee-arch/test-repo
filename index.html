<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ToDo List — a responsive, accessible, zero-dependency web application built with vanilla HTML5, CSS3, and ES6+ JavaScript.">
  <meta name="color-scheme" content="light dark">
  <title>ToDo List</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main id="app">
    <!-- ─── Header ─── -->
    <header>
      <h1>ToDo</h1>
      <button id="theme-btn" aria-label="Switch to dark mode">🌙</button>
    </header>

    <!-- ─── Main Card ─── -->
    <section class="todo-container" aria-label="Todo List">

      <!-- Input form -->
      <form id="todo-form" class="todo-form" novalidate>
        <label for="todo-input" class="visually-hidden">New task</label>
        <input
          type="text"
          id="todo-input"
          placeholder="What needs to be done?"
          maxlength="200"
          autocomplete="off"
          aria-describedby="char-hint"
        >
        <button type="submit" aria-label="Add new task">+</button>
        <span id="char-hint" hidden>Maximum 200 characters</span>
      </form>

      <!-- Error area -->
      <div id="error-msg" class="error-msg" role="alert" aria-live="polite"></div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state">
        <p>✨ No tasks yet. Add one above!</p>
      </div>

      <!-- Todo list -->
      <ul id="todo-list" class="todo-list" role="list" aria-label="Tasks"></ul>

      <!-- Footer -->
      <footer class="todo-footer">
        <span id="items-left" aria-live="polite">0 items left</span>
        <div class="filters" role="group" aria-label="Filter tasks">
          <button class="filter-btn active" data-filter="all"       aria-pressed="true">All</button>
          <button class="filter-btn"        data-filter="active"    aria-pressed="false">Active</button>
          <button class="filter-btn"        data-filter="completed" aria-pressed="false">Completed</button>
        </div>
        <button id="clear-completed" class="clear-btn" style="display:none">
          Clear completed
        </button>
      </footer>

    </section>
  </main>

  <!-- ─── Scripts (order matters) ─── -->
  <script src="js/model.js"></script>
  <script src="js/view.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
