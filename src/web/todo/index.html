<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>todos</title>
  <style>
    /* === Global Reset === */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }

    /* === Layout === */
    .container {
      max-width: 550px;
      margin: 60px auto 0;
      padding: 0 20px;
    }

    /* === Header === */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 64px;
      font-weight: 200;
      color: #e8b4b8;
      letter-spacing: -1px;
    }

    /* === Input === */
    #new-todo {
      width: 100%;
      padding: 16px 16px 16px 60px;
      font-size: 24px;
      font-weight: 200;
      border: 1px solid #e6e6e6;
      border-radius: 4px;
      outline: none;
      background: #fff;
      box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.05), 0 1px 2px 0 rgba(0, 0, 0, 0.03);
    }

    #new-todo::placeholder {
      font-style: italic;
      font-weight: 200;
      color: #d9d9d9;
    }

    #new-todo:focus {
      border-color: #c8a8ac;
      box-shadow: 0 0 4px rgba(200, 168, 172, 0.4);
    }

    /* === Main Card === */
    .main {
      background: #fff;
      box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      border-radius: 4px;
      margin-top: 8px;
    }

    /* === Todo List === */
    #todo-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .todo-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #ededed;
      transition: background-color 0.15s ease;
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .todo-item:hover {
      background-color: #fafafa;
    }

    /* === Checkbox === */
    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 16px;
      cursor: pointer;
      accent-color: #5dc2af;
      flex-shrink: 0;
    }

    /* === Label === */
    .todo-item label {
      flex: 1;
      font-size: 20px;
      font-weight: 300;
      color: #4a4a4a;
      word-break: break-word;
      padding: 4px 0;
      cursor: pointer;
    }

    /* === Completed Items === */
    .todo-item.completed label {
      text-decoration: line-through;
      color: #d9d9d9;
      opacity: 0.5;
      transition: all 0.2s ease;
    }

    /* === Delete Button === */
    .todo-item .delete-btn {
      font-size: 22px;
      font-weight: 300;
      color: #cc9a9a;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 6px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.15s ease;
      flex-shrink: 0;
    }

    .todo-item:hover .delete-btn {
      opacity: 1;
    }

    .todo-item .delete-btn:hover {
      color: #af5b5b;
    }

    /* === Footer === */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-top: 1px solid #ededed;
      font-size: 14px;
      color: #777;
    }

    #todo-count {
      font-weight: 400;
    }

    /* === Filter Buttons === */
    .filters {
      display: flex;
      gap: 4px;
    }

    .filters button {
      font-size: 13px;
      font-family: inherit;
      color: #777;
      background: none;
      border: 1px solid transparent;
      border-radius: 3px;
      padding: 3px 7px;
      cursor: pointer;
      transition: border-color 0.15s ease;
    }

    .filters button:hover {
      border-color: rgba(175, 47, 47, 0.15);
    }

    .filters button.active {
      border-color: rgba(175, 47, 47, 0.2);
      outline: none;
    }

    /* === Clear Completed === */
    #clear-completed {
      font-size: 13px;
      font-family: inherit;
      color: #777;
      background: none;
      border: none;
      cursor: pointer;
      padding: 3px 4px;
      transition: color 0.15s ease;
    }

    #clear-completed:hover {
      color: #4a4a4a;
      text-decoration: underline;
    }

    #clear-completed.hidden {
      display: none;
    }

    /* === Empty State === */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #b3b3b3;
      font-size: 18px;
      font-weight: 300;
      font-style: italic;
    }

    .empty-state.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>todos</h1>
    </header>

    <!-- Input -->
    <input type="text" id="new-todo" placeholder="What needs to be done?" autofocus>

    <!-- Main Card -->
    <div class="main">
      <!-- Todo List -->
      <ul id="todo-list"></ul>

      <!-- Footer -->
      <div class="footer">
        <span id="todo-count">0 items left</span>
        <div class="filters">
          <button id="filter-all" class="active">All</button>
          <button id="filter-active">Active</button>
          <button id="filter-completed">Completed</button>
        </div>
        <button id="clear-completed" class="hidden">Clear completed</button>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state">
      No tasks yet — add one above
    </div>
  </div>

  <script>
    // === Helper ===
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    // === Storage Layer ===
    function loadTodos() {
      try {
        const data = localStorage.getItem('todo_items');
        if (data === null) return [];
        const parsed = JSON.parse(data);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        console.warn('loadTodos error:', e);
        return [];
      }
    }

    function saveTodos(todos) {
      try {
        localStorage.setItem('todo_items', JSON.stringify(todos));
      } catch (e) {
        console.warn('saveTodos error:', e);
      }
    }

    // === State ===
    const state = { todos: [], filter: 'all' };

    // === DOM refs ===
    const todoListEl = document.getElementById('todo-list');
    const newTodoInput = document.getElementById('new-todo');
    const todoCountEl = document.getElementById('todo-count');
    const clearCompletedBtn = document.getElementById('clear-completed');
    const emptyStateEl = document.querySelector('.empty-state');
    const filterAll = document.getElementById('filter-all');
    const filterActive = document.getElementById('filter-active');
    const filterCompleted = document.getElementById('filter-completed');

    // === State Management ===
    function addTodo(title) {
      if (!title || title.trim() === '') return;
      const item = {
        id: generateId(),
        title: title.trim(),
        completed: false,
        createdAt: Date.now()
      };
      state.todos.unshift(item);
      saveTodos(state.todos);
      render();
    }

    function toggleTodo(id) {
      const item = state.todos.find(t => t.id === id);
      if (!item) return;
      item.completed = !item.completed;
      saveTodos(state.todos);
      render();
    }

    function deleteTodo(id) {
      state.todos = state.todos.filter(t => t.id !== id);
      saveTodos(state.todos);
      render();
    }

    function editTodo(id, newTitle) {
      const item = state.todos.find(t => t.id === id);
      if (!item) return;
      item.title = (newTitle && newTitle.trim()) ? newTitle.trim() : 'Untitled';
      saveTodos(state.todos);
      render();
    }

    function clearCompleted() {
      state.todos = state.todos.filter(t => !t.completed);
      saveTodos(state.todos);
      render();
    }

    function setFilter(filter) {
      state.filter = filter;
      [filterAll, filterActive, filterCompleted].forEach(btn => btn.classList.remove('active'));
      if (filter === 'all') filterAll.classList.add('active');
      else if (filter === 'active') filterActive.classList.add('active');
      else if (filter === 'completed') filterCompleted.classList.add('active');
      render();
    }

    // === Render ===
    function render() {
      const sorted = [...state.todos].sort((a, b) => b.createdAt - a.createdAt);

      let filtered;
      if (state.filter === 'active') {
        filtered = sorted.filter(t => !t.completed);
      } else if (state.filter === 'completed') {
        filtered = sorted.filter(t => t.completed);
      } else {
        filtered = sorted;
      }

      todoListEl.innerHTML = '';

      filtered.forEach(item => {
        const li = document.createElement('li');
        li.className = 'todo-item' + (item.completed ? ' completed' : '');
        li.dataset.id = item.id;

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.completed;
        cb.addEventListener('change', () => toggleTodo(item.id));

        const label = document.createElement('label');
        label.textContent = item.title;
        label.addEventListener('dblclick', () => {
          const input = document.createElement('input');
          input.type = 'text';
          input.value = item.title;
          input.className = 'edit-input';
          input.style.cssText = 'flex:1; font-size:20px; font-weight:300; padding:4px 0; border:1px solid #ccc; border-radius:3px; outline:none; font-family:inherit;';
          label.replaceWith(input);
          input.focus();
          input.select();

          function commitEdit() {
            editTodo(item.id, input.value);
          }

          input.addEventListener('blur', commitEdit);
          input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { input.blur(); }
            if (e.key === 'Escape') { input.value = item.title; input.blur(); }
          });
        });

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.textContent = '×';
        delBtn.addEventListener('click', () => deleteTodo(item.id));

        li.appendChild(cb);
        li.appendChild(label);
        li.appendChild(delBtn);
        todoListEl.appendChild(li);
      });

      // Update count
      const activeCount = state.todos.filter(t => !t.completed).length;
      todoCountEl.textContent = activeCount + ' item' + (activeCount !== 1 ? 's' : '') + ' left';

      // Clear completed visibility
      const hasCompleted = state.todos.some(t => t.completed);
      clearCompletedBtn.classList.toggle('hidden', !hasCompleted);

      // Empty state
      emptyStateEl.classList.toggle('hidden', filtered.length > 0);
    }

    // === Event Wiring ===
    newTodoInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        addTodo(newTodoInput.value);
        newTodoInput.value = '';
      }
    });

    clearCompletedBtn.addEventListener('click', clearCompleted);

    filterAll.addEventListener('click', () => setFilter('all'));
    filterActive.addEventListener('click', () => setFilter('active'));
    filterCompleted.addEventListener('click', () => setFilter('completed'));

    // === Init ===
    state.todos = loadTodos();
    render();
  </script>
</body>
</html>
