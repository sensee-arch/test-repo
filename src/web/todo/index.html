<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>todos</title>
  <style>
    /* === Global Reset === */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }

    /* === Container === */
    .container {
      max-width: 550px;
      margin: 60px auto 0;
      padding: 0 20px;
    }

    /* === Header === */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 64px;
      font-weight: 200;
      color: #e8b4b8;
      letter-spacing: -1px;
    }

    /* === New Todo Input === */
    #new-todo {
      width: 100%;
      padding: 16px 16px 16px 60px;
      font-size: 24px;
      font-weight: 200;
      border: 1px solid #e6e6e6;
      border-radius: 4px;
      outline: none;
      background: #fff;
      box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.05), 0 1px 2px 0 rgba(0, 0, 0, 0.03);
    }

    #new-todo::placeholder {
      font-style: italic;
      font-weight: 200;
      color: #d9d9d9;
    }

    #new-todo:focus {
      border-color: #c8a8ac;
      box-shadow: 0 0 4px rgba(200, 168, 172, 0.4);
      outline: 3px solid #4a9eff;
      outline-offset: -1px;
    }

    /* === Main Card === */
    .main {
      background: #fff;
      box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      border-radius: 4px;
      margin-top: 8px;
    }

    /* === Todo List === */
    #todo-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    /* Fade-in animation for new items */
    @keyframes fadeInItem {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #ededed;
      background-color: #fff;
      transition: background-color 0.15s ease, opacity 0.2s ease;
      animation: fadeInItem 0.2s ease;
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .todo-item:hover {
      background-color: #f5f5f5;
    }

    /* === Checkbox === */
    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 16px;
      cursor: pointer;
      accent-color: #5dc2af;
      flex-shrink: 0;
      transition: transform 0.15s ease;
    }

    .todo-item input[type="checkbox"]:hover {
      transform: scale(1.2);
    }

    /* === Label === */
    .todo-item label {
      flex: 1;
      font-size: 20px;
      font-weight: 300;
      color: #4a4a4a;
      word-break: break-word;
      padding: 4px 0;
      cursor: pointer;
    }

    /* === Completed Items === */
    .todo-item.completed label {
      text-decoration: line-through;
      color: #d9d9d9;
      opacity: 0.5;
      transition: all 0.2s ease;
    }



    /* === Delete Button === */
    .todo-item .destroy {
      font-size: 22px;
      font-weight: 300;
      color: #cc9a9a;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 6px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.15s ease;
      flex-shrink: 0;
    }

    .todo-item:hover .destroy {
      opacity: 1;
    }

    .todo-item .destroy:hover {
      color: #af5b5b;
      background: rgba(204, 154, 154, 0.1);
      border-radius: 3px;
    }

    /* === Edit Input === */
    .todo-item .edit {
      flex: 1;
      font-size: 20px;
      font-weight: 300;
      padding: 4px 0;
      border: 1px solid #ccc;
      border-radius: 3px;
      outline: none;
      font-family: inherit;
    }

    .todo-item .edit:focus {
      border-color: #4a9eff;
      box-shadow: 0 0 3px rgba(74, 158, 255, 0.4);
    }

    /* === Footer === */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-top: 1px solid #ededed;
      font-size: 14px;
      color: #777;
    }

    #todo-count {
      font-weight: 400;
    }

    /* === Filter Buttons === */
    .filters {
      display: flex;
      gap: 4px;
    }

    .filters button {
      font-size: 13px;
      font-family: inherit;
      color: #777;
      background: none;
      border: 1px solid transparent;
      border-radius: 3px;
      padding: 3px 7px;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }

    .filters button:hover {
      border-color: rgba(175, 47, 47, 0.15);
      background: rgba(175, 47, 47, 0.05);
    }

    .filters button.active {
      border-color: rgba(175, 47, 47, 0.2);
      outline: 2px solid rgba(175, 47, 47, 0.2);
    }

    /* === Clear Completed Button === */
    #clear-completed {
      font-size: 13px;
      font-family: inherit;
      color: #777;
      background: none;
      border: none;
      cursor: pointer;
      padding: 3px 4px;
      transition: color 0.15s ease, opacity 0.15s ease;
    }

    #clear-completed:hover:not(:disabled) {
      color: #4a4a4a;
      text-decoration: underline;
    }

    #clear-completed:disabled {
      opacity: 0.3;
      cursor: default;
      text-decoration: none;
    }

    #clear-completed.hidden {
      display: none;
    }

    /* === Empty State === */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #b3b3b3;
      font-size: 18px;
      font-weight: 300;
      font-style: italic;
    }

    .empty-state.hidden {
      display: none;
    }

    /* === Buttons (global hover/focus consistency) === */
    button {
      transition: background-color 0.15s ease, color 0.15s ease, opacity 0.15s ease;
    }

    button:hover:not(:disabled) {
      background: rgba(0, 0, 0, 0.03);
    }

    /* === Responsive Design === */
    @media (max-width: 480px) {
      .container {
        padding: 0 12px;
        margin-top: 30px;
      }

      .header h1 {
        font-size: 48px;
      }

      #new-todo {
        font-size: 18px;
        padding: 12px 12px 12px 48px;
      }

      .todo-item {
        padding: 10px 12px;
      }

      .todo-item label {
        font-size: 16px;
      }

      .todo-item .edit {
        font-size: 16px;
      }

      .footer {
        flex-direction: column;
        gap: 8px;
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>todos</h1>
    </header>

    <!-- Input -->
    <input type="text" id="new-todo" placeholder="What needs to be done?" autofocus>

    <!-- Main Card -->
    <div class="main">
      <!-- Todo List -->
      <ul id="todo-list"></ul>

      <!-- Footer -->
      <div class="footer">
        <span id="todo-count">0 items left</span>
        <div class="filters">
          <button id="filter-all" class="active">All</button>
          <button id="filter-active">Active</button>
          <button id="filter-completed">Completed</button>
        </div>
        <button id="clear-completed" disabled>Clear completed</button>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state">
      No tasks yet — add one above
    </div>
  </div>

  <script>
    // === Helper ===
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    /**
     * Escape HTML special characters to prevent XSS.
     * @param {string} str - raw input string
     * @returns {string} - HTML-entity escaped string
     */
    function escapeHtml(str) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
      return String(str).replace(/[&<>"']/g, ch => map[ch]);
    }

    // === Storage Layer ===
    function loadTodos() {
      try {
        const data = localStorage.getItem('todo_items');
        if (data === null) return [];
        const parsed = JSON.parse(data);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        console.warn('loadTodos error:', e);
        return [];
      }
    }

    function saveTodos(todos) {
      try {
        localStorage.setItem('todo_items', JSON.stringify(todos));
      } catch (e) {
        console.warn('saveTodos error:', e);
      }
    }

    // === State ===
    const state = { todos: [], filter: 'all' };

    // === DOM refs ===
    const todoListEl = document.getElementById('todo-list');
    const newTodoInput = document.getElementById('new-todo');
    const todoCountEl = document.getElementById('todo-count');
    const clearCompletedBtn = document.getElementById('clear-completed');
    const emptyStateEl = document.querySelector('.empty-state');
    const filterAll = document.getElementById('filter-all');
    const filterActive = document.getElementById('filter-active');
    const filterCompleted = document.getElementById('filter-completed');

    // === State Management ===
    function addTodo(title) {
      if (!title || title.trim() === '') return;
      const item = {
        id: generateId(),
        title: title.trim(),
        completed: false,
        createdAt: Date.now()
      };
      state.todos.unshift(item);
      saveTodos(state.todos);
      render();
    }

    function toggleTodo(id) {
      const item = state.todos.find(t => t.id === id);
      if (!item) return;
      item.completed = !item.completed;
      saveTodos(state.todos);
      render();
    }

    function deleteTodo(id) {
      state.todos = state.todos.filter(t => t.id !== id);
      saveTodos(state.todos);
      render();
    }

    function editTodo(id, newTitle) {
      const item = state.todos.find(t => t.id === id);
      if (!item) return;
      item.title = (newTitle && newTitle.trim()) ? newTitle.trim() : 'Untitled';
      saveTodos(state.todos);
      render();
    }

    function clearCompleted() {
      state.todos = state.todos.filter(t => !t.completed);
      saveTodos(state.todos);
      render();
    }

    function setFilter(filter) {
      state.filter = filter;
      [filterAll, filterActive, filterCompleted].forEach(btn => btn.classList.remove('active'));
      if (filter === 'all') filterAll.classList.add('active');
      else if (filter === 'active') filterActive.classList.add('active');
      else if (filter === 'completed') filterCompleted.classList.add('active');
      render();
    }

    // === Render Layer ===
    /**
     * Render the todo list UI based on current state.
     * - Sorts by createdAt descending
     * - Applies active filter
     * - Uses event delegation (no direct listeners on generated elements)
     */
    function render() {
      // Sort by createdAt descending (newest first)
      const sorted = [...state.todos].sort((a, b) => b.createdAt - a.createdAt);

      // Apply filter
      let filtered;
      if (state.filter === 'active') {
        filtered = sorted.filter(t => !t.completed);
      } else if (state.filter === 'completed') {
        filtered = sorted.filter(t => t.completed);
      } else {
        filtered = sorted;
      }

      // Clear list
      todoListEl.innerHTML = '';

      // Build list items
      filtered.forEach(item => {
        const li = document.createElement('li');
        li.className = 'todo-item' + (item.completed ? ' completed' : '');
        li.dataset.id = item.id;

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.completed;

        const label = document.createElement('label');
        label.textContent = item.title;
        label.addEventListener('dblclick', () => {
          const input = document.createElement('input');
          input.type = 'text';
          input.value = item.title;
          input.className = 'edit';
          label.replaceWith(input);
          input.focus();
          input.select();

          // Guard: prevent double-save when blur fires after Enter
          let saved = false;

          function commitEdit() {
            if (saved) return;
            saved = true;
            editTodo(item.id, input.value);
          }

          input.addEventListener('blur', commitEdit);
          input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
              saved = true;
              editTodo(item.id, input.value);
              input.blur();
            }
            if (e.key === 'Escape') {
              saved = true;
              input.value = item.title;
              input.blur();
            }
          });
        });

        const delBtn = document.createElement('button');
        delBtn.className = 'destroy';
        delBtn.textContent = '×';

        li.appendChild(cb);
        li.appendChild(label);
        li.appendChild(delBtn);
        todoListEl.appendChild(li);
      });

      // Update remaining count
      const activeCount = state.todos.filter(t => !t.completed).length;
      todoCountEl.textContent = activeCount + ' item' + (activeCount !== 1 ? 's' : '') + ' left';

      // Sync filter button active state in render (covers all paths)
      [filterAll, filterActive, filterCompleted].forEach(btn => btn.classList.remove('active'));
      if (state.filter === 'all') filterAll.classList.add('active');
      else if (state.filter === 'active') filterActive.classList.add('active');
      else if (state.filter === 'completed') filterCompleted.classList.add('active');

      // Clear completed disabled state
      const hasCompleted = state.todos.some(t => t.completed);
      clearCompletedBtn.disabled = !hasCompleted;

      // Empty state: show when no items visible (filtered)
      emptyStateEl.classList.toggle('hidden', filtered.length > 0);
    }

    // === Event Handlers (event delegation) ===

    // New todo input: Enter key
    newTodoInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        addTodo(newTodoInput.value);
        newTodoInput.value = '';
      }
    });

    // Delegated click on #todo-list
    todoListEl.addEventListener('click', (e) => {
      const target = e.target;
      // Check if target is a checkbox
      if (target.type === 'checkbox') {
        const li = target.closest('li');
        if (li && li.dataset.id) {
          toggleTodo(li.dataset.id);
        }
        return;
      }
      // Check if target is a destroy button
      if (target.classList.contains('destroy') || target.textContent === '×') {
        const li = target.closest('li');
        if (li && li.dataset.id) {
          deleteTodo(li.dataset.id);
        }
        return;
      }
    });

    // Delegated dblclick on #todo-list for inline editing
    todoListEl.addEventListener('dblclick', (e) => {
      const target = e.target;
      // Only trigger on label elements
      if (target.tagName !== 'LABEL') return;
      const li = target.closest('li');
      if (!li || !li.dataset.id) return;
      const id = li.dataset.id;
      const currentTitle = target.textContent;

      // Replace label with edit input
      const editInput = document.createElement('input');
      editInput.type = 'text';
      editInput.className = 'edit';
      editInput.value = currentTitle;
      target.replaceWith(editInput);
      editInput.focus();
      editInput.select();

      // Named blur handler to allow removal on Escape
      function saveOnBlur() {
        editTodo(id, editInput.value);
      }

      editInput.addEventListener('blur', saveOnBlur);

      editInput.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') {
          editInput.blur();
        } else if (ev.key === 'Escape') {
          // Remove blur handler first to avoid saving, then restore original
          editInput.removeEventListener('blur', saveOnBlur);
          editTodo(id, currentTitle);
        }
      });
    });

    // Filter buttons
    filterAll.addEventListener('click', () => setFilter('all'));
    filterActive.addEventListener('click', () => setFilter('active'));
    filterCompleted.addEventListener('click', () => setFilter('completed'));

    // Clear completed
    clearCompletedBtn.addEventListener('click', clearCompleted);

    // === Initialization ===
    document.addEventListener('DOMContentLoaded', () => {
      state.todos = loadTodos();
      state.filter = 'all';
      render();
    });
  </script>
</body>
</html>
