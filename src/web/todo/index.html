<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    /* Reset / normalize */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      justify-content: center;
      padding-top: 60px;
      min-height: 100vh;
    }

    /* Centered card layout */
    #todo-app {
      width: 100%;
      max-width: 550px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-self: flex-start;
    }

    h1 {
      font-size: 28px;
      font-weight: 300;
      text-align: center;
      color: #e74c3c;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    /* Input styling */
    #new-todo {
      width: 100%;
      padding: 14px 16px;
      font-size: 20px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    #new-todo:focus {
      border-color: transparent;
      border-bottom: 2px solid #e74c3c;
    }

    #new-todo::placeholder {
      font-style: italic;
      color: #bbb;
    }

    /* List container */
    #todo-list {
      list-style: none;
      margin-top: 16px;
    }

    #todo-list li {
      display: flex;
      align-items: center;
      padding: 12px 8px;
      border-bottom: 1px solid #eee;
      transition: background-color 0.2s ease;
    }

    #todo-list li:hover {
      background-color: #fafafa;
    }

    #todo-list li input[type="checkbox"] {
      margin-right: 12px;
      width: 20px;
      height: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    #todo-list li .view {
      flex: 1;
      font-size: 18px;
      word-break: break-word;
    }

    #todo-list li .edit {
      flex: 1;
      font-size: 18px;
      padding: 4px 8px;
      border: 1px solid #ddd;
      border-radius: 3px;
      outline: none;
    }

    #todo-list li .edit:focus {
      border-color: #e74c3c;
    }

    /* Completed item */
    #todo-list li.completed .view {
      text-decoration: line-through;
      opacity: 0.5;
    }

    /* Delete button */
    #todo-list li .destroy {
      background: none;
      border: none;
      font-size: 22px;
      color: #ccc;
      cursor: pointer;
      padding: 0 8px;
      visibility: hidden;
      transition: color 0.2s ease, opacity 0.2s ease;
    }

    #todo-list li:hover .destroy {
      visibility: visible;
    }

    #todo-list li .destroy:hover {
      color: #e74c3c;
    }

    /* Footer */
    #footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      margin-top: 8px;
      font-size: 14px;
      color: #888;
    }

    #item-count {
      font-weight: 500;
    }

    #filters {
      display: flex;
      gap: 4px;
    }

    #filters .filter-btn {
      background: none;
      border: 1px solid transparent;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 3px;
      color: #888;
      transition: border-color 0.2s ease, color 0.2s ease, opacity 0.2s ease;
    }

    #filters .filter-btn:hover {
      border-color: rgba(231, 76, 60, 0.3);
    }

    #filters .filter-btn.selected {
      border-color: #e74c3c;
      color: #333;
      font-weight: 500;
    }

    #clear-completed {
      background: none;
      border: 1px solid transparent;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 3px;
      color: #888;
      transition: color 0.2s ease, opacity 0.2s ease;
    }

    #clear-completed:hover {
      text-decoration: underline;
    }

    #clear-completed:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      text-decoration: none;
    }

    /* Responsive */
    @media (max-width: 500px) {
      body {
        padding-top: 20px;
      }

      #todo-app {
        padding: 16px;
        border-radius: 0;
        box-shadow: none;
      }

      h1 {
        font-size: 22px;
        margin-bottom: 12px;
      }

      #new-todo {
        font-size: 16px;
        padding: 12px;
      }

      #todo-list li {
        padding: 10px 4px;
      }

      #todo-list li .view,
      #todo-list li .edit {
        font-size: 16px;
      }

      #footer {
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div id="todo-app">
    <h1>todos</h1>

    <form id="todo-form">
      <input
        type="text"
        id="new-todo"
        placeholder="What needs to be done?"
        autocomplete="off"
        autofocus
      />
    </form>

    <ul id="todo-list"></ul>

    <footer id="footer">
      <span id="item-count">0 items left</span>
      <div id="filters">
        <button class="filter-btn selected" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
      <button id="clear-completed">Clear completed</button>
    </footer>
  </div>

  <script>
    // ============= Module A — Storage (TASK-1) =============
    const STORAGE_KEY = 'todo_items';

    function loadTodos() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data === null) return [];
        return JSON.parse(data);
      } catch (error) {
        console.warn('loadTodos error:', error);
        return [];
      }
    }

    function saveTodos(items) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      } catch (error) {
        console.warn('Save failed:', error);
      }
    }

    // ============= Module B — State (TASK-2) =============
    const state = {
      todos: [],
      filter: 'all'
    };

    function addTodo(title) {
      const trimmed = title.trim();
      if (!trimmed) return null;
      const item = {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        title: trimmed,
        completed: false,
        createdAt: Date.now()
      };
      state.todos = [item, ...state.todos];
      saveTodos(state.todos);
      return item;
    }

    function toggleTodo(id) {
      const item = state.todos.find(t => t.id === id);
      if (item) {
        item.completed = !item.completed;
        saveTodos(state.todos);
      }
    }

    function editTodo(id, title) {
      const trimmed = title.trim();
      if (!trimmed) return;
      const item = state.todos.find(t => t.id === id);
      if (item) {
        item.title = trimmed;
        saveTodos(state.todos);
      }
    }

    function deleteTodo(id) {
      state.todos = state.todos.filter(t => t.id !== id);
      saveTodos(state.todos);
    }

    function clearCompleted() {
      state.todos = state.todos.filter(t => !t.completed);
      saveTodos(state.todos);
    }

    function getFilteredTodos() {
      const sorted = [...state.todos].sort((a, b) => b.createdAt - a.createdAt);
      if (state.filter === 'active') return sorted.filter(t => !t.completed);
      if (state.filter === 'completed') return sorted.filter(t => t.completed);
      return sorted;
    }

    // ============= Initialization =============
    state.todos = loadTodos();
    state.filter = 'all';

    // ============= DOM refs =============
    const newTodoInput = document.getElementById('new-todo');
    const todoList = document.getElementById('todo-list');
    const itemCount = document.getElementById('item-count');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const filtersContainer = document.getElementById('filters');
    const clearCompletedBtn = document.getElementById('clear-completed');

    // ============= Module C — Render (TASK-3) =============
    function render() {
      const items = getFilteredTodos();

      // Clear list
      todoList.innerHTML = '';

      // Build each item as DOM nodes
      items.forEach(function (item) {
        const li = document.createElement('li');
        li.setAttribute('data-id', item.id);

        if (item.completed) {
          li.classList.add('completed');
        }

        // Checkbox toggle
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'toggle';
        checkbox.checked = item.completed;

        // Title text (XSS safe via textContent)
        const span = document.createElement('span');
        span.className = 'view';
        span.textContent = item.title;

        // Destroy button
        const destroyBtn = document.createElement('button');
        destroyBtn.className = 'destroy';
        destroyBtn.textContent = '\u00D7';

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(destroyBtn);
        todoList.appendChild(li);
      });

      // Update item count
      const remaining = state.todos.filter(function (t) { return !t.completed; }).length;
      itemCount.textContent = remaining + ' item' + (remaining !== 1 ? 's' : '') + ' left';

      // Update filter buttons
      filterBtns.forEach(function (btn) {
        btn.classList.remove('selected');
        if (btn.getAttribute('data-filter') === state.filter) {
          btn.classList.add('selected');
        }
      });

      // Update clear-completed visibility
      clearCompletedBtn.style.display = state.todos.some(function (t) { return t.completed; }) ? 'block' : 'none';
    }

    // ============= Module D — Events (TASK-3) =============

    // commitEdit helper
    function commitEdit(inputEl, id, originalTitle) {
      var value = inputEl.value.trim();
      if (value === '' || value === originalTitle) {
        // Cancel: restore original span
        var li = inputEl.closest('li');
        var span = document.createElement('span');
        span.className = 'view';
        span.textContent = originalTitle;
        inputEl.parentNode.replaceChild(span, inputEl);
        return;
      }
      editTodo(id, value);
      render();
    }

    // #new-todo keydown
    newTodoInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        var value = newTodoInput.value.trim();
        if (value !== '') {
          addTodo(value);
          newTodoInput.value = '';
          render();
        }
      }
    });

    // #todo-list single click delegation (toggle / destroy)
    todoList.addEventListener('click', function (e) {
      var li = e.target.closest('li');
      if (!li) return;
      var id = li.getAttribute('data-id');

      if (e.target.classList.contains('toggle')) {
        toggleTodo(id);
        render();
      } else if (e.target.classList.contains('destroy')) {
        deleteTodo(id);
        render();
      }
    });

    // #todo-list double-click on .view span (inline editing)
    todoList.addEventListener('dblclick', function (e) {
      if (e.target.classList.contains('view')) {
        var span = e.target;
        var li = span.closest('li');
        var id = li.getAttribute('data-id');
        var originalTitle = span.textContent;

        var input = document.createElement('input');
        input.className = 'edit';
        input.value = originalTitle;

        span.parentNode.replaceChild(input, span);
        input.focus();
        input.select();

        function onKeydown(ev) {
          if (ev.key === 'Enter') {
            input.removeEventListener('keydown', onKeydown);
            input.removeEventListener('blur', onBlur);
            commitEdit(input, id, originalTitle);
          } else if (ev.key === 'Escape') {
            input.removeEventListener('keydown', onKeydown);
            input.removeEventListener('blur', onBlur);
            // Restore span
            var restoredSpan = document.createElement('span');
            restoredSpan.className = 'view';
            restoredSpan.textContent = originalTitle;
            input.parentNode.replaceChild(restoredSpan, input);
          }
        }

        function onBlur() {
          input.removeEventListener('keydown', onKeydown);
          input.removeEventListener('blur', onBlur);
          commitEdit(input, id, originalTitle);
        }

        input.addEventListener('keydown', onKeydown);
        input.addEventListener('blur', onBlur);
      }
    });

    // #filters click on .filter-btn
    filtersContainer.addEventListener('click', function (e) {
      if (e.target.classList.contains('filter-btn')) {
        state.filter = e.target.getAttribute('data-filter');
        render();
      }
    });

    // #clear-completed click
    clearCompletedBtn.addEventListener('click', function () {
      clearCompleted();
      render();
    });

    // ============= Initial Render =============
    render();
  </script>
</body>
</html>
