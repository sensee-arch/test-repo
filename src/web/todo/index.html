<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodoList</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <h1 class="app-title">📋 TodoList</h1>
      <p class="app-subtitle">Stay organized, stay productive</p>
    </header>

    <!-- Input Area -->
    <section class="input-section">
      <form class="todo-form" id="todoForm" autocomplete="off">
        <input
          type="text"
          id="todoInput"
          class="todo-input"
          placeholder="What needs to be done?"
          maxlength="200"
          aria-label="New task title"
        >
        <button type="submit" class="btn btn-add" id="addBtn" aria-label="Add task">
          Add
        </button>
      </form>
    </section>

    <!-- Filter Bar -->
    <section class="filter-section" id="filterSection">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all" aria-label="Show all tasks">All</button>
        <button class="filter-btn" data-filter="active" aria-label="Show active tasks">Active</button>
        <button class="filter-btn" data-filter="completed" aria-label="Show completed tasks">Completed</button>
      </div>
      <button class="btn btn-clear" id="clearBtn" aria-label="Clear completed tasks">
        Clear completed
      </button>
    </section>

    <!-- Task List -->
    <section class="list-section">
      <div class="task-count" id="taskCount">0 items</div>
      <ul class="task-list" id="taskList" role="list" aria-label="Task list"></ul>
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📝</div>
        <p class="empty-text">No tasks yet. Add one above!</p>
      </div>
    </section>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
