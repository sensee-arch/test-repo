<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    /* ========================================
       Reset & Base
    ======================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
      padding: 48px 16px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ========================================
       App Container
    ======================================== */
    #app {
      width: 100%;
      max-width: 550px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    /* ========================================
       Header
    ======================================== */
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      padding: 24px 24px 0;
      color: #4a90d9;
    }

    /* ========================================
       Input Area
    ======================================== */
    .input-area {
      padding: 16px 24px 12px;
    }

    #new-todo {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    #new-todo:focus {
      border-color: #4a90d9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
    }

    #new-todo::placeholder {
      color: #bbb;
      font-style: italic;
    }

    /* ========================================
       Filter Bar
    ======================================== */
    .filter-bar {
      display: flex;
      gap: 4px;
      padding: 0 24px 12px;
      border-bottom: 1px solid #eee;
    }

    .filter-btn {
      padding: 6px 16px;
      font-size: 0.85rem;
      border: 1px solid transparent;
      border-radius: 20px;
      background: transparent;
      color: #777;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-btn:hover {
      color: #333;
      background: #f0f0f0;
    }

    .filter-btn.active {
      color: #4a90d9;
      border-color: #4a90d9;
      background: rgba(74, 144, 217, 0.08);
      font-weight: 600;
    }

    /* ========================================
       Todo List
    ======================================== */
    #todo-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.2s ease, opacity 0.3s ease;
    }

    .todo-item:hover {
      background: #fafafa;
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .todo-item input[type='checkbox'] {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      appearance: none;
      -webkit-appearance: none;
      border: 2px solid #ccc;
      border-radius: 50%;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }

    .todo-item input[type='checkbox']:checked {
      border-color: #4a90d9;
      background: #4a90d9;
    }

    .todo-item input[type='checkbox']:checked::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 6px;
      width: 5px;
      height: 9px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .todo-item .todo-title {
      flex: 1;
      font-size: 0.95rem;
      word-break: break-word;
      cursor: default;
      transition: color 0.2s ease, text-decoration 0.2s ease;
    }

    .todo-item.completed .todo-title {
      color: #d9d9d9;
      text-decoration: line-through;
    }

    .todo-item .delete-btn {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s ease, color 0.2s ease, background 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .todo-item:hover .delete-btn {
      opacity: 1;
    }

    .todo-item .delete-btn:hover {
      color: #e74c3c;
      background: rgba(231, 76, 60, 0.1);
    }

    /* ========================================
       Edit Input (inline editing)
    ======================================== */
    .todo-item .edit-input {
      flex: 1;
      padding: 4px 8px;
      font-size: 0.95rem;
      border: 2px solid #4a90d9;
      border-radius: 4px;
      outline: none;
    }

    /* ========================================
       Footer
    ======================================== */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #fafafa;
      border-top: 1px solid #eee;
      font-size: 0.85rem;
      color: #888;
    }

    #remain-count {
      font-weight: 600;
      color: #555;
    }

    #clear-completed {
      padding: 4px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      background: #fff;
      color: #888;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #clear-completed:hover {
      border-color: #e74c3c;
      color: #e74c3c;
      background: rgba(231, 76, 60, 0.05);
    }

    #clear-completed:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: #e0e0e0;
      color: #888;
      background: #fff;
    }

    /* ========================================
       Empty State
    ======================================== */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #bbb;
      font-size: 0.95rem;
    }

    /* ========================================
       Responsive
    ======================================== */
    @media (max-width: 480px) {
      body {
        padding: 0;
      }

      #app {
        border-radius: 0;
        box-shadow: none;
        min-height: 100vh;
      }

      h1 {
        padding-top: 20px;
        font-size: 1.3rem;
      }

      .todo-item {
        padding: 12px 16px;
      }

      .input-area,
      .filter-bar {
        padding-left: 16px;
        padding-right: 16px;
      }

      .footer {
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>Todo List</h1>

    <div class="input-area">
      <input type="text" id="new-todo" placeholder="What needs to be done?">
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <ul id="todo-list">
      <!-- Dynamic todo items will be rendered here -->
    </ul>

    <div class="footer">
      <span><span id="remain-count">0</span> items left</span>
      <button id="clear-completed" disabled>Clear completed</button>
    </div>
  </div>

  <script>
    // JavaScript logic will be added in TASK-2 and TASK-3
  </script>
</body>
</html>
