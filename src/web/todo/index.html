<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="todoapp">
    <header class="header">
      <h1>todos</h1>
      <input id="new-todo" class="new-todo" placeholder="What needs to be done?" autofocus>
    </header>
    <main class="main">
      <ul id="todo-list" class="todo-list"></ul>
    </main>
    <footer id="footer" class="footer">
      <span id="todo-count" class="todo-count"><strong>0</strong> items left</span>
      <ul class="filters">
        <li><a id="filter-all" href="#/" class="selected">All</a></li>
        <li><a id="filter-active" href="#/active">Active</a></li>
        <li><a id="filter-completed" href="#/completed">Completed</a></li>
      </ul>
      <button id="clear-completed" class="clear-completed">Clear completed</button>
    </footer>
  </section>
  <script src="app.js"></script>
</body>
</html>
