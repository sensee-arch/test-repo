<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    /* ========================================
       Reset & Base
    ======================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
      padding: 48px 16px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ========================================
       App Container
    ======================================== */
    #app {
      width: 100%;
      max-width: 550px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    /* ========================================
       Header
    ======================================== */
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      padding: 24px 24px 0;
      color: #4a90d9;
    }

    /* ========================================
       Input Area
    ======================================== */
    .input-area {
      padding: 16px 24px 12px;
    }

    #new-todo {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    #new-todo:focus {
      border-color: #4a90d9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
    }

    #new-todo::placeholder {
      color: #bbb;
      font-style: italic;
    }

    /* ========================================
       Filter Bar
    ======================================== */
    .filter-bar {
      display: flex;
      gap: 4px;
      padding: 0 24px 12px;
      border-bottom: 1px solid #eee;
    }

    .filter-btn {
      padding: 6px 16px;
      font-size: 0.85rem;
      border: 1px solid transparent;
      border-radius: 20px;
      background: transparent;
      color: #777;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-btn:hover {
      color: #333;
      background: #f0f0f0;
    }

    .filter-btn.active {
      color: #4a90d9;
      border-color: #4a90d9;
      background: rgba(74, 144, 217, 0.08);
      font-weight: 600;
    }

    /* ========================================
       Todo List
    ======================================== */
    #todo-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.2s ease, opacity 0.3s ease;
    }

    .todo-item:hover {
      background: #fafafa;
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .todo-item input[type='checkbox'] {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      appearance: none;
      -webkit-appearance: none;
      border: 2px solid #ccc;
      border-radius: 50%;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }

    .todo-item input[type='checkbox']:checked {
      border-color: #4a90d9;
      background: #4a90d9;
    }

    .todo-item input[type='checkbox']:checked::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 6px;
      width: 5px;
      height: 9px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .todo-item .todo-title {
      flex: 1;
      font-size: 0.95rem;
      word-break: break-word;
      cursor: default;
      transition: color 0.2s ease, text-decoration 0.2s ease;
    }

    .todo-item.completed .todo-title {
      color: #d9d9d9;
      text-decoration: line-through;
    }

    .todo-item .delete-btn {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s ease, color 0.2s ease, background 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .todo-item:hover .delete-btn {
      opacity: 1;
    }

    .todo-item .delete-btn:hover {
      color: #e74c3c;
      background: rgba(231, 76, 60, 0.1);
    }

    /* ========================================
       Edit Input (inline editing)
    ======================================== */
    .todo-item .edit-input {
      flex: 1;
      padding: 4px 8px;
      font-size: 0.95rem;
      border: 2px solid #4a90d9;
      border-radius: 4px;
      outline: none;
    }

    /* ========================================
       Footer
    ======================================== */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #fafafa;
      border-top: 1px solid #eee;
      font-size: 0.85rem;
      color: #888;
    }

    #remain-count {
      font-weight: 600;
      color: #555;
    }

    #clear-completed {
      padding: 4px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      background: #fff;
      color: #888;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #clear-completed:hover {
      border-color: #e74c3c;
      color: #e74c3c;
      background: rgba(231, 76, 60, 0.05);
    }

    #clear-completed:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: #e0e0e0;
      color: #888;
      background: #fff;
    }

    /* ========================================
       Empty State
    ======================================== */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #bbb;
      font-size: 0.95rem;
    }

    /* ========================================
       Responsive
    ======================================== */
    @media (max-width: 480px) {
      body {
        padding: 0;
      }

      #app {
        border-radius: 0;
        box-shadow: none;
        min-height: 100vh;
      }

      h1 {
        padding-top: 20px;
        font-size: 1.3rem;
      }

      .todo-item {
        padding: 12px 16px;
      }

      .input-area,
      .filter-bar {
        padding-left: 16px;
        padding-right: 16px;
      }

      .footer {
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>Todo List</h1>

    <div class="input-area">
      <input type="text" id="new-todo" placeholder="What needs to be done?">
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <ul id="todo-list">
      <!-- Dynamic todo items will be rendered here -->
    </ul>

    <div class="footer">
      <span><span id="remain-count">0</span> items left</span>
      <button id="clear-completed" disabled>Clear completed</button>
    </div>
  </div>

  <script>
    // ==========================================
    // State Variables
    // ==========================================
    let todos = [];           // Array<TodoItem>
    let currentFilter = 'all'; // 'all' | 'active' | 'completed'

    // ==========================================
    // Utility Functions
    // ==========================================

    /**
     * Generate a unique ID for a new todo item
     * @returns {string}
     */
    function generateId() {
      return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
    }

    /**
     * Escape HTML special characters to prevent XSS
     * @param {string} text
     * @returns {string}
     */
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(text));
      return div.innerHTML;
    }

    // ==========================================
    // Storage Module (localStorage CRUD)
    // ==========================================

    /**
     * Load todos from localStorage
     * @returns {Array<{id:string, title:string, completed:boolean, createdAt:number}>}
     */
    function loadTodos() {
      try {
        const raw = localStorage.getItem('todo_items');
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        // Validate each item has required fields
        return parsed.filter(item =>
          item &&
          typeof item.id === 'string' &&
          typeof item.title === 'string' &&
          typeof item.completed === 'boolean' &&
          typeof item.createdAt === 'number'
        );
      } catch (e) {
        console.warn('Failed to load todos from localStorage:', e);
        return [];
      }
    }

    /**
     * Save todos to localStorage
     * @param {Array} todosData
     */
    function saveTodos(todosData) {
      try {
        localStorage.setItem('todo_items', JSON.stringify(todosData));
      } catch (e) {
        console.warn('Failed to save todos to localStorage:', e);
      }
    }

    // ==========================================
    // Render Functions
    // ==========================================

    /**
     * Create a single todo DOM element
     * @param {{id:string, title:string, completed:boolean}} todo
     * @returns {HTMLLIElement}
     */
    function createTodoElement(todo) {
      const li = document.createElement('li');
      li.className = 'todo-item' + (todo.completed ? ' completed' : '');
      li.dataset.id = todo.id;

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = todo.completed;

      const titleSpan = document.createElement('span');
      titleSpan.className = 'todo-title';
      titleSpan.textContent = todo.title;

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '✕';

      li.appendChild(cb);
      li.appendChild(titleSpan);
      li.appendChild(delBtn);

      return li;
    }

    /**
     * Filter todos by status
     * @param {Array} todosData
     * @param {string} filter
     * @returns {Array}
     */
    function filterTodos(todosData, filter) {
      if (filter === 'active') return todosData.filter(t => !t.completed);
      if (filter === 'completed') return todosData.filter(t => t.completed);
      return todosData; // 'all'
    }

    /**
     * Update the remaining items counter
     */
    function updateCounter() {
      const count = todos.filter(t => !t.completed).length;
      document.getElementById('remain-count').textContent = count;
    }

    /**
     * Full re-render of the todo list, counter, and filter states
     */
    function render() {
      const listEl = document.getElementById('todo-list');
      listEl.innerHTML = '';

      const filtered = filterTodos(todos, currentFilter);

      if (filtered.length === 0) {
        const emptyLi = document.createElement('li');
        emptyLi.className = 'empty-state';
        if (todos.length === 0) {
          emptyLi.textContent = 'No tasks yet. Add one above!';
        } else if (currentFilter === 'active') {
          emptyLi.textContent = 'All done! 🎉';
        } else {
          emptyLi.textContent = 'No completed tasks.';
        }
        listEl.appendChild(emptyLi);
      } else {
        for (const todo of filtered) {
          listEl.appendChild(createTodoElement(todo));
        }
      }

      updateCounter();

      // Update filter button styles
      document.querySelectorAll('.filter-btn').forEach(btn => {
        const filter = btn.dataset.filter;
        btn.classList.toggle('active', filter === currentFilter);
      });

      // Update clear-completed button state
      const hasCompleted = todos.some(t => t.completed);
      document.getElementById('clear-completed').disabled = !hasCompleted;
    }

    // ==========================================
    // Business Logic (Event Handlers)
    // ==========================================

    /**
     * Add a new todo
     * @param {string} title
     */
    function addTodo(title) {
      const trimmed = title.trim();
      if (!trimmed) return;
      if (trimmed.length > 200) return;
      todos.push({
        id: generateId(),
        title: trimmed,
        completed: false,
        createdAt: Date.now()
      });
      saveTodos(todos);
      render();
    }

    /**
     * Toggle todo completion status by id
     * @param {string} id
     */
    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      todo.completed = !todo.completed;
      saveTodos(todos);
      render();
    }

    /**
     * Edit todo title by id
     * @param {string} id
     * @param {string} newTitle
     */
    function editTodo(id, newTitle) {
      const trimmed = newTitle.trim();
      if (!trimmed) return;
      if (trimmed.length > 200) return;
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      todo.title = trimmed;
      saveTodos(todos);
      render();
    }

    /**
     * Delete a todo by id
     * @param {string} id
     */
    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      saveTodos(todos);
      render();
    }

    /**
     * Set the current filter and re-render
     * @param {'all'|'active'|'completed'} filter
     */
    function setFilter(filter) {
      currentFilter = filter;
      render();
    }

    /**
     * Remove all completed todos
     */
    function clearCompleted() {
      todos = todos.filter(t => !t.completed);
      saveTodos(todos);
      render();
    }

    // ==========================================
    // Event Binding & Initialization
    // ==========================================

    document.addEventListener('DOMContentLoaded', function () {
      // Load persisted data
      todos = loadTodos();

      // --- New todo input ---
      document.getElementById('new-todo').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          addTodo(this.value);
          this.value = '';
        }
      });

      // --- Filter buttons ---
      document.querySelectorAll('.filter-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          setFilter(this.dataset.filter);
        });
      });

      // --- Clear completed button ---
      document.getElementById('clear-completed').addEventListener('click', function () {
        clearCompleted();
      });

      // --- Event delegation on #todo-list ---
      const todoList = document.getElementById('todo-list');

      // Toggle checkbox
      todoList.addEventListener('change', function (e) {
        if (e.target.matches('input[type="checkbox"]')) {
          const li = e.target.closest('.todo-item');
          if (li) toggleTodo(li.dataset.id);
        }
      });

      // Delete button
      todoList.addEventListener('click', function (e) {
        if (e.target.matches('.delete-btn')) {
          const li = e.target.closest('.todo-item');
          if (li) deleteTodo(li.dataset.id);
        }
      });

      // Double-click to edit
      todoList.addEventListener('dblclick', function (e) {
        const titleEl = e.target.closest('.todo-title');
        if (!titleEl) return;
        const li = titleEl.closest('.todo-item');
        if (!li) return;

        const currentTitle = titleEl.textContent;
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'edit-input';
        input.value = currentTitle;

        titleEl.replaceWith(input);
        input.focus();
        input.select();

        let saved = false; // Prevent double-save on Enter+blur

        function saveEdit() {
          if (saved) return;
          saved = true;
          const newVal = input.value.trim();
          if (newVal && newVal !== currentTitle) {
            editTodo(li.dataset.id, newVal);
          } else {
            render(); // Restore original
          }
        }

        input.addEventListener('keydown', function (ke) {
          if (ke.key === 'Enter') {
            ke.preventDefault();
            saveEdit();
          } else if (ke.key === 'Escape') {
            saved = true;
            render(); // Cancel editing, restore
          }
        });

        input.addEventListener('blur', function () {
          setTimeout(saveEdit, 150);
        });
      });

      // Initial render
      render();
    });
  </script>
</body>
</html>
