<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>todos</title>
  <style>
    /* === Global Reset === */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }

    /* === Layout === */
    .container {
      max-width: 550px;
      margin: 60px auto 0;
      padding: 0 20px;
    }

    /* === Header === */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 64px;
      font-weight: 200;
      color: #e8b4b8;
      letter-spacing: -1px;
    }

    /* === Input === */
    #new-todo {
      width: 100%;
      padding: 16px 16px 16px 60px;
      font-size: 24px;
      font-weight: 200;
      border: 1px solid #e6e6e6;
      border-radius: 4px;
      outline: none;
      background: #fff;
      box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.05), 0 1px 2px 0 rgba(0, 0, 0, 0.03);
    }

    #new-todo::placeholder {
      font-style: italic;
      font-weight: 200;
      color: #d9d9d9;
    }

    #new-todo:focus {
      border-color: #c8a8ac;
      box-shadow: 0 0 4px rgba(200, 168, 172, 0.4);
    }

    /* === Main Card === */
    .main {
      background: #fff;
      box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      border-radius: 4px;
      margin-top: 8px;
    }

    /* === Todo List === */
    #todo-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .todo-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #ededed;
      transition: background-color 0.15s ease;
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .todo-item:hover {
      background-color: #fafafa;
    }

    /* === Checkbox === */
    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 16px;
      cursor: pointer;
      accent-color: #5dc2af;
      flex-shrink: 0;
    }

    /* === Label === */
    .todo-item label {
      flex: 1;
      font-size: 20px;
      font-weight: 300;
      color: #4a4a4a;
      word-break: break-word;
      padding: 4px 0;
      cursor: pointer;
    }

    /* === Completed Items === */
    .todo-item.completed label {
      text-decoration: line-through;
      color: #d9d9d9;
      opacity: 0.5;
      transition: all 0.2s ease;
    }

    /* === Delete Button === */
    .todo-item .delete-btn {
      font-size: 22px;
      font-weight: 300;
      color: #cc9a9a;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 6px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.15s ease;
      flex-shrink: 0;
    }

    .todo-item:hover .delete-btn {
      opacity: 1;
    }

    .todo-item .delete-btn:hover {
      color: #af5b5b;
    }

    /* === Footer === */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-top: 1px solid #ededed;
      font-size: 14px;
      color: #777;
    }

    #todo-count {
      font-weight: 400;
    }

    /* === Filter Buttons === */
    .filters {
      display: flex;
      gap: 4px;
    }

    .filters button {
      font-size: 13px;
      font-family: inherit;
      color: #777;
      background: none;
      border: 1px solid transparent;
      border-radius: 3px;
      padding: 3px 7px;
      cursor: pointer;
      transition: border-color 0.15s ease;
    }

    .filters button:hover {
      border-color: rgba(175, 47, 47, 0.15);
    }

    .filters button.active {
      border-color: rgba(175, 47, 47, 0.2);
      outline: none;
    }

    /* === Clear Completed === */
    #clear-completed {
      font-size: 13px;
      font-family: inherit;
      color: #777;
      background: none;
      border: none;
      cursor: pointer;
      padding: 3px 4px;
      transition: color 0.15s ease;
    }

    #clear-completed:hover {
      color: #4a4a4a;
      text-decoration: underline;
    }

    #clear-completed.hidden {
      display: none;
    }

    /* === Empty State === */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #b3b3b3;
      font-size: 18px;
      font-weight: 300;
      font-style: italic;
    }

    .empty-state.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>todos</h1>
    </header>

    <!-- Input -->
    <input type="text" id="new-todo" placeholder="What needs to be done?" autofocus>

    <!-- Main Card -->
    <div class="main">
      <!-- Todo List -->
      <ul id="todo-list"></ul>

      <!-- Footer -->
      <div class="footer">
        <span id="todo-count">0 items left</span>
        <div class="filters">
          <button id="filter-all" class="active">All</button>
          <button id="filter-active">Active</button>
          <button id="filter-completed">Completed</button>
        </div>
        <button id="clear-completed" class="hidden">Clear completed</button>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state">
      No tasks yet — add one above
    </div>
  </div>

  <!-- JavaScript placeholder -->
  <script></script>
</body>
</html>
