<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    /* Reset / normalize */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      justify-content: center;
      padding-top: 60px;
      min-height: 100vh;
    }

    /* Centered card layout */
    #todo-app {
      width: 100%;
      max-width: 550px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-self: flex-start;
    }

    h1 {
      font-size: 28px;
      font-weight: 300;
      text-align: center;
      color: #e74c3c;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    /* Input styling */
    #new-todo {
      width: 100%;
      padding: 14px 16px;
      font-size: 20px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    #new-todo:focus {
      border-color: transparent;
      border-bottom: 2px solid #e74c3c;
    }

    #new-todo::placeholder {
      font-style: italic;
      color: #bbb;
    }

    /* List container */
    #todo-list {
      list-style: none;
      margin-top: 16px;
    }

    #todo-list li {
      display: flex;
      align-items: center;
      padding: 12px 8px;
      border-bottom: 1px solid #eee;
      transition: background-color 0.2s ease;
    }

    #todo-list li:hover {
      background-color: #fafafa;
    }

    #todo-list li input[type="checkbox"] {
      margin-right: 12px;
      width: 20px;
      height: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    #todo-list li .todo-text {
      flex: 1;
      font-size: 18px;
      word-break: break-word;
    }

    /* Completed item */
    #todo-list li.completed .todo-text {
      text-decoration: line-through;
      opacity: 0.5;
    }

    /* Delete button */
    #todo-list li .destroy {
      background: none;
      border: none;
      font-size: 22px;
      color: #ccc;
      cursor: pointer;
      padding: 0 8px;
      visibility: hidden;
      transition: color 0.2s ease, opacity 0.2s ease;
    }

    #todo-list li:hover .destroy {
      visibility: visible;
    }

    #todo-list li .destroy:hover {
      color: #e74c3c;
    }

    /* Footer */
    #footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      margin-top: 8px;
      font-size: 14px;
      color: #888;
    }

    #item-count {
      font-weight: 500;
    }

    #filters {
      display: flex;
      gap: 4px;
    }

    #filters .filter-btn {
      background: none;
      border: 1px solid transparent;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 3px;
      color: #888;
      transition: border-color 0.2s ease, color 0.2s ease, opacity 0.2s ease;
    }

    #filters .filter-btn:hover {
      border-color: rgba(231, 76, 60, 0.3);
    }

    #filters .filter-btn.selected {
      border-color: #e74c3c;
      color: #333;
      font-weight: 500;
    }

    #clear-completed {
      background: none;
      border: 1px solid transparent;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 3px;
      color: #888;
      transition: color 0.2s ease, opacity 0.2s ease;
    }

    #clear-completed:hover {
      text-decoration: underline;
    }

    #clear-completed:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      text-decoration: none;
    }

    /* Responsive */
    @media (max-width: 500px) {
      body {
        padding-top: 20px;
      }

      #todo-app {
        padding: 16px;
        border-radius: 0;
        box-shadow: none;
      }

      h1 {
        font-size: 22px;
        margin-bottom: 12px;
      }

      #new-todo {
        font-size: 16px;
        padding: 12px;
      }

      #todo-list li {
        padding: 10px 4px;
      }

      #todo-list li .todo-text {
        font-size: 16px;
      }

      #footer {
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div id="todo-app">
    <h1>todos</h1>

    <form id="todo-form">
      <input
        type="text"
        id="new-todo"
        placeholder="What needs to be done?"
        autocomplete="off"
        autofocus
      />
    </form>

    <ul id="todo-list"></ul>

    <footer id="footer">
      <span id="item-count">0 items left</span>
      <div id="filters">
        <button class="filter-btn selected" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
      <button id="clear-completed" disabled>Clear completed</button>
    </footer>
  </div>

  <script>
    // State
    let todos = [];
    let filter = 'all';

    // DOM refs
    const form = document.getElementById('todo-form');
    const input = document.getElementById('new-todo');
    const list = document.getElementById('todo-list');
    const itemCount = document.getElementById('item-count');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const clearCompleted = document.getElementById('clear-completed');

    // Helpers
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    // Render
    function render() {
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.completed;
        if (filter === 'completed') return t.completed;
        return true;
      });

      list.innerHTML = filtered.map(t => `
        <li class="${t.completed ? 'completed' : ''}" data-id="${t.id}">
          <input type="checkbox" ${t.completed ? 'checked' : ''} />
          <span class="todo-text">${escapeHtml(t.text)}</span>
          <button class="destroy">&times;</button>
        </li>
      `).join('');

      const activeCount = todos.filter(t => !t.completed).length;
      itemCount.textContent = `${activeCount} ${activeCount === 1 ? 'item' : 'items'} left`;

      clearCompleted.disabled = !todos.some(t => t.completed);

      filterBtns.forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.filter === filter);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Add
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      todos.push({ id: generateId(), text, completed: false });
      input.value = '';
      render();
    });

    // Toggle / Delete (delegated)
    list.addEventListener('change', (e) => {
      if (e.target.type === 'checkbox') {
        const li = e.target.closest('li');
        const todo = todos.find(t => t.id === li.dataset.id);
        if (todo) {
          todo.completed = e.target.checked;
          render();
        }
      }
    });

    list.addEventListener('click', (e) => {
      if (e.target.classList.contains('destroy')) {
        const li = e.target.closest('li');
        todos = todos.filter(t => t.id !== li.dataset.id);
        render();
      }
    });

    // Filters
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        render();
      });
    });

    // Clear completed
    clearCompleted.addEventListener('click', () => {
      todos = todos.filter(t => !t.completed);
      render();
    });
  </script>
</body>
</html>
