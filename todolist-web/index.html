<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodoList</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div class="app-container">
      <header>
        <h1>TodoList</h1>
      </header>

      <section class="input-area" id="todo-input">
        <input type="text" class="todo-input" id="todo-input-field" placeholder="添加新任务..." aria-label="新任务">
        <button class="add-btn" id="add-btn">添加</button>
      </section>

      <section class="todo-list" id="todo-list" aria-label="任务列表">
        <!-- Task items will be rendered here by script.js -->
        <!-- Each item: <div class="todo-item" data-id="...">
               <input type="checkbox" class="todo-checkbox">
               <span class="todo-title">...</span>
               <button class="delete-btn">删除</button>
             </div> -->
      </section>

      <footer class="stats-bar" id="todo-stats" aria-label="任务统计">
        <span class="stats-count" data-type="total">全部: <span id="total-count">0</span></span>
        <span class="stats-count" data-type="active">未完成: <span id="active-count">0</span></span>
        <span class="stats-count" data-type="done">已完成: <span id="done-count">0</span></span>
      </footer>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
